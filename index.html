<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - FKS Bondowoso</title>
    <link rel="stylesheet" href="css/halamanutama.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

<div class="dashboard-container">
    <!-- SIDEBAR -->
    <aside class="sidebar">
        <div class="logo-container">
            <div class="logo">
                <img src="FKS.png" class="logo-img" alt="Logo FKS Bondowoso">
            </div>
            <div class="logo-text">
                <h2>FKS Bondowoso</h2>
                <p>Forum Komunikasi Santri</p>
            </div>
        </div>
        
        <nav class="sidebar-nav">
            <a href="index.html" class="nav-item active">
                <i class="fas fa-home"></i>
                <span>Dashboard</span>
            </a>
            <a href="Catatan_Keuangan.html" class="nav-item">
                <i class="fas fa-wallet"></i>
                <span>Keuangan</span>
            </a>
            <a href="Ceklist_Kebutuhan.html" class="nav-item">
                <i class="fas fa-clipboard-list"></i>
                <span>Ceklist Kebutuhan</span>
            </a>
            <a href="anggota.html" class="nav-item">
                <i class="fas fa-users"></i>
                <span>Data Anggota</span>
            </a>
        </nav>
        
        <div class="sidebar-footer">
            <div class="user-info">
                <img src="https://ui-avatars.com/api/?name=Admin+FKS&background=2c3e50&color=fff" alt="User">
                <div>
                    <p class="user-name">Admin FKS</p>
                    <p class="user-role">Ketua Umum</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN CONTENT -->
    <main class="main-content">
        <!-- TOP BAR -->
        <header class="top-bar">
            <div class="search-bar">
                <i class="fas fa-search"></i>
                <input type="text" placeholder="Cari kegiatan, transaksi, atau anggota...">
            </div>
            <div class="top-actions">
                <div class="date-display">
                    <i class="fas fa-calendar-day"></i>
                    <span id="currentDate"></span>
                </div>
            </div>
        </header>

        <!-- WELCOME SECTION -->
        <section class="welcome-section">
            <div class="welcome-text">
                <h1>Selamat Datang, <span>Admin FKS</span> 👋</h1>
            </div>
            <div class="quick-actions">
                <button class="quick-btn" onclick="window.location.href='Catatan_Keuangan.html'">
                    <i class="fas fa-plus-circle"></i>
                    Tambah Transaksi
                </button>
                <button class="quick-btn" onclick="window.location.href='Ceklist_Kebutuhan.html'">
                    <i class="fas fa-check-circle"></i>
                    Update Kebutuhan
                </button>
            </div>
        </section>

        <!-- STATS CARDS -->
        <section class="stats-grid">
            <div class="stat-card">
                <div class="stat-icon" style="background: #e8f5e9; color: #2e7d32;">
                    <i class="fas fa-wallet"></i>
                </div>
                <div class="stat-info">
                    <h3>Total Saldo</h3>
                    <p class="stat-value">Rp 2.750.000</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: #e3f2fd; color: #1565c0;">
                    <i class="fas fa-users"></i>
                </div>
<div class="stat-card">
    <div class="stat-info">
        <h3>Total Anggota</h3>
        <p class="stat-value"></p>
        <p class="stat-change">
            <i class="fas fa-user-plus"></i>
        </p>
    </div>
</div>
            
            <div class="stat-card">
                <div class="stat-icon" style="background: #fff3e0; color: #ef6c00;">
                    <i class="fas fa-tasks"></i>
                </div>
                <div class="stat-info">
                    <h3>Progress Kebutuhan</h3>
                    <p class="stat-value">68%</p>
                    <p class="stat-change">
                        <i class="fas fa-check-circle"></i> 7/7 divisi aktif
                    </p>
                </div>
            </div>
        </section>
<!-- SCRIPT -->
<script>
    // Set tanggal hari ini
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('currentDate').textContent = new Date().toLocaleDateString('id-ID', options);
    
    // Ambil data dari localStorage untuk update stat
    function loadDashboardData() {
        // Data keuangan
        const keuanganData = localStorage.getItem('fks_keuangan');
        if (keuanganData) {
            const transactions = JSON.parse(keuanganData);
            let saldo = 0;
            transactions.forEach(t => {
                if (t.type === 'masuk') saldo += t.amount;
                else saldo -= t.amount;
            });
            // Update saldo di dashboard
            const saldoEl = document.querySelector('.stat-card:nth-child(1) .stat-value');
            if (saldoEl) saldoEl.textContent = 'Rp ' + saldo.toLocaleString('id-ID');
        }
        
        // Data kebutuhan
        const kebutuhanData = localStorage.getItem('fks_kebutuhan');
        if (kebutuhanData) {
            // Hitung progress rata-rata
        }
    }
    
    loadDashboardData();
</script>

<script src="js/kebutuhan.js"></script>

</body>
</html>
